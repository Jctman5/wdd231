<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Thank you for joining the Chamber">
  <meta name="author" content="Your Name">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thank You | Chamber of Commerce</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/larger.css">
</head>

<body>

<header>
  <h1>Chamber of Commerce</h1>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="directory.html">Directory</a>
  <a href="join.html">Join</a>
</nav>

<main>

<h1>Thank You for Applying!</h1>

<p>We appreciate your interest in joining the Chamber of Commerce.</p>

<section class="results">
  <h2>Your Submitted Information</h2>

  <p><strong>First Name:</strong> <span id="fname"></span></p>
  <p><strong>Last Name:</strong> <span id="lname"></span></p>
  <p><strong>Email:</strong> <span id="email"></span></p>
  <p><strong>Phone:</strong> <span id="phone"></span></p>
  <p><strong>Business Name:</strong> <span id="business"></span></p>
  <p><strong>Submitted:</strong> <span id="timestamp"></span></p>
</section>

</main>

<footer>
  <p>&copy; <span id="year"></span> Jackson Taylor</p>
  <p id="lastModified"></p>
</footer>

<!-- JS -->
<script>
  // Get form data from URL
  const params = new URLSearchParams(window.location.search);

  document.getElementById("fname").textContent = params.get("fname");
  document.getElementById("lname").textContent = params.get("lname");
  document.getElementById("email").textContent = params.get("email");
  document.getElementById("phone").textContent = params.get("phone");
  document.getElementById("business").textContent = params.get("business");
  document.getElementById("timestamp").textContent = params.get("timestamp");

  // Footer info
  document.getElementById("year").textContent = new Date().getFullYear();
  document.getElementById("lastModified").textContent = document.lastModified;
</script>

</body>
</html>
